version: 2
project_name: vpin-plunger

builds:
  - id: plunger
    main: ./cmd/plunger
    binary: plunger
    env:
      - CGO_ENABLED=0
    goos: [linux, windows]
    goarch: [amd64, arm64]
    ldflags: [-s -w]

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
