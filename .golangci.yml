version: "2"

run:
  timeout: 5m
  relative-path-mode: cfg

linters:
  default: standard
  enable:
    - govet
    - errcheck
    - staticcheck
    - gosimple
    - unused
    - lll
  settings:
    lll:
      line-length: 120
    govet:
      enable:
        - shadow
    errcheck:
      check-type-assertions: true
      check-blank: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
